<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      color: #d1d5db;
      background: url('https://images.unsplash.com/photo-1518770660439-4636190af475') no-repeat center center fixed;
      background-size: cover;
    }

    .overlay {
      background: rgba(0,0,0,0.85);
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      padding-top: 20px;
      color: #e5e7eb;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: rgba(20,20,20,0.9);
      border-radius: 12px;
      padding: 15px;
      border: 1px solid #2a2a2a;
      cursor: grab;
    }

    .card h2 {
      margin-top: 0;
      border-bottom: 1px solid #333;
    }

    a {
      display: block;
      color: #9ca3af;
      margin: 5px 0;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
<div class="overlay">

<h1>🧠 Dev Dashboard</h1>

<div class="grid" id="grid">

  <div class="card" draggable="true">
    <h2>💼 Career</h2>
    <a href="https://www.linkedin.com" target="_blank">LinkedIn</a>
    <a href="https://github.com/Codynw42" target="_blank">My GitHub</a>
  </div>

  <div class="card" draggable="true">
    <h2>🌦 Weather</h2>
    <p>Akron, OH</p>
    <div id="weatherWidget"></div>
  </div>

  <div class="card" draggable="true">
    <h2>🧩 Focus</h2>
    <ul>
      <li>Practice coding</li>
      <li>Apply to jobs</li>
      <li>Learn something new</li>
    </ul>
  </div>

</div>

</div>

<script>
// Draggable cards
const cards = document.querySelectorAll('.card');
cards.forEach(card => {
  card.addEventListener('dragstart', () => card.classList.add('dragging'));
  card.addEventListener('dragend', () => card.classList.remove('dragging'));
});

const grid = document.getElementById('grid');
grid.addEventListener('dragover', e => {
  e.preventDefault();
  const dragging = document.querySelector('.dragging');
  grid.appendChild(dragging);
});

// Simple GitHub fetch
fetch('https://api.github.com/users/Codynw42/repos')
.then(res => res.json())
.then(data => {
  const career = document.querySelector('.card');
  data.slice(0,5).forEach(repo => {
    const link = document.createElement('a');
    link.href = repo.html_url;
    link.textContent = repo.name;
    career.appendChild(link);
  });
});
</script>

</body>
</html>
