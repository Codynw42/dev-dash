<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dev Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    h1 {
      text-align: center;
      margin-top: 20px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .card h2 {
      margin-top: 0;
      font-size: 18px;
      border-bottom: 1px solid #334155;
      padding-bottom: 5px;
    }

    a {
      display: block;
      color: #38bdf8;
      text-decoration: none;
      margin: 8px 0;
      font-size: 15px;
    }

    a:hover {
      text-decoration: underline;
    }

    .checklist {
      list-style: none;
      padding-left: 0;
    }

    .checklist li {
      margin: 8px 0;
    }

    input[type="checkbox"] {
      margin-right: 8px;
    }
  </style>
</head>
<body>

  <h1>🧠 My Dev Dashboard</h1>

  <div class="container">

    <div class="card">
      <h2>💼 Career</h2>
      <a href="https://www.linkedin.com" target="_blank">LinkedIn</a>
      <a href="https://github.com" target="_blank">GitHub</a>
    </div>

    <div class="card">
      <h2>📚 Learning</h2>
      <a href="https://roadmap.sh" target="_blank">Dev Roadmap</a>
      <a href="https://leetcode.com" target="_blank">LeetCode</a>
      <a href="https://tryhackme.com" target="_blank">TryHackMe</a>
    </div>

    <div class="card">
      <h2>🎥 Content / Resources</h2>
      <a href="https://youtube.com" target="_blank">YouTube</a>
      <a href="https://twitch.tv" target="_blank">Twitch</a>
    </div>

    <div class="card">
      <h2>⚙️ Daily Checklist</h2>
      <ul class="checklist">
        <li><input type="checkbox"> Check LinkedIn</li>
        <li><input type="checkbox"> Practice coding</li>
        <li><input type="checkbox"> Review GitHub</li>
        <li><input type="checkbox"> Learn something new</li>
        <li><input type="checkbox"> Apply / network</li>
      </ul>
    </div>

  </div>

</body>
</html>
